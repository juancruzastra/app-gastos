<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Gastos</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="container">
        <header class="topbar">
          <button class="toplink active" data-page="gastos" type="button">gastos</button>
          <span class="slash">/</span>
          <button class="toplink" data-page="resumen" type="button">resumen</button>
        </header>

        <main>
          <section id="page-gastos" class="page active">
            <div class="card">
              <h1 class="title">GASTOS</h1>

              <form id="expenseForm" class="form">
                <div class="field">
                  <label for="description">detalle</label>
                  <input
                    type="text"
                    id="description"
                    placeholder="Ej: combustible, almuerzo, sueldo..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="amount">monto</label>
                  <input
                    type="number"
                    id="amount"
                    min="0"
                    step="0.01"
                    placeholder="0.00"
                    required
                  />
                </div>

                <div class="field">
                  <label>tipo</label>
                  <div class="icon-grid type-grid" id="typeGroup">
                    <button type="button" class="icon-option selected" data-value="gasto">➖</button>
                    <button type="button" class="icon-option" data-value="ingreso">➕</button>
                  </div>
                  <input type="hidden" id="movementType" value="gasto" />
                </div>

                <div class="field">
                  <label>categoria</label>
                  <div class="icon-grid" id="categoryGroup"></div>
                  <input type="hidden" id="category" />
                </div>

                <div class="field">
                  <label>medio de pago</label>
                  <div class="icon-grid payment-grid" id="paymentGroup"></div>
                  <input type="hidden" id="paymentMethod" />
                </div>

                <div class="field">
                  <label for="date">fecha</label>
                  <input type="date" id="date" readonly />
                </div>

                <button type="submit" class="add-btn">＋</button>
              </form>
            </div>
          </section>

          <section id="page-resumen" class="page">
            <div class="card">
              <h2 class="section-title">Resumen</h2>

              <div class="stats">
                <div class="stat">
                  <span>saldo</span>
                  <strong id="totalBalance">$0</strong>
                </div>
                <div class="stat">
                  <span>movimientos</span>
                  <strong id="totalCount">0</strong>
                </div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Movimientos</h2>
              <div id="expenseList" class="list">
                <div class="empty">Todavía no hay movimientos cargados.</div>
              </div>
            </div>

            <div class="card">
              <h2 class="section-title">Desglose</h2>
              <div id="summary" class="summary">
                <div class="empty">Cargá movimientos para ver el desglose.</div>
              </div>
            </div>

            <div class="card">
              <button type="button" id="clearButton" class="secondary full-btn">Limpiar todo</button>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
