<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Gastos</title>
    <meta name="theme-color" content="#0b0f17" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@400,0,0,24"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <div class="container">
        <header class="topbar">
          <button class="toplink active" data-page="gastos" type="button">Agregar</button>
          <span class="slash">/</span>
          <button class="toplink" data-page="resumen" type="button">Resumen</button>
          <button class="toplink" data-page="historial" type="button">Historial</button>
        </header>

        <main>
          <section id="page-gastos" class="page active">
            <div class="card">
              <div class="hero">
                <p class="eyebrow">App Gastos</p>
                <h1 class="title">Gestor de Gastos</h1>
              </div>

              <form id="expenseForm" class="form">
                <input type="hidden" id="date" />

                <div class="field">
                  <label>Tipo</label>
                  <div class="icon-grid type-grid" id="typeGroup">
                    <button
                      type="button"
                      class="icon-option selected type-gasto"
                      data-value="gasto"
                      title="Gasto"
                      aria-label="Gasto"
                    >
                      <span class="material-symbols-outlined">remove_circle</span>
                    </button>
                    <button
                      type="button"
                      class="icon-option type-ingreso"
                      data-value="ingreso"
                      title="Ingreso"
                      aria-label="Ingreso"
                    >
                      <span class="material-symbols-outlined">add_circle</span>
                    </button>
                  </div>
                  <input type="hidden" id="movementType" value="gasto" />
                </div>

                <div class="field">
                  <label for="description">Detalle</label>
                  <input
                    type="text"
                    id="description"
                    placeholder="Ej: combustible, sueldo, café..."
                    autocomplete="off"
                    required
                  />
                </div>

                <div class="field">
                  <label for="amount">Monto</label>
                  <input
                    type="number"
                    id="amount"
                    min="0"
                    step="0.01"
                    placeholder="0.00"
                    required
                  />
                </div>

                <div class="field">
                  <label>Categoría</label>
                  <div class="icon-grid category-grid" id="categoryGroup"></div>
                  <input type="hidden" id="category" />
                </div>

                <div class="field">
                  <label>Medio de pago</label>
                  <div class="icon-grid payment-grid" id="paymentGroup"></div>
                  <input type="hidden" id="paymentMethod" />
                </div>

                <button type="submit" class="add-btn" title="Agregar" aria-label="Agregar">＋</button>
              </form>
            </div>
          </section>

          <section id="page-resumen" class="page">
            <div class="card">
              <div class="section-head">
                <div>
                  <h2 class="section-title">Resumen</h2>
                  <p class="muted">Balance y movimientos</p>
                </div>
                <button type="button" id="exportExcelBtn" class="secondary">Exportar Excel</button>
              </div>

              <div class="stats">
                <div class="stat stat-income">
                  <span>Ingresos</span>
                  <strong id="totalIncome">$0</strong>
                </div>
                <div class="stat stat-expense">
                  <span>Gastos</span>
                  <strong id="totalExpense">$0</strong>
                </div>
                <div class="stat stat-balance">
                  <span>Balance</span>
                  <strong id="totalBalance">$0</strong>
                </div>
                <div class="stat">
                  <span>Movimientos</span>
                  <strong id="totalCount">0</strong>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="section-head">
                <div>
                  <h2 class="section-title">Historial</h2>
                  <p class="muted">Editar o borrar movimientos</p>
                </div>
              </div>

              <div id="historyList" class="list">
                <div class="empty">Todavía no hay movimientos cargados.</div>
              </div>
            </div>
          </section>

          <section id="page-historial" class="page">
            <div class="card">
    <div class="section-head">
      <div>
        <h2 class="section-title">Historial</h2>
        <p class="muted">Movimientos agrupados por mes</p>
      </div>
      <button type="button" id="resetHistoryFilters" class="secondary">Limpiar filtros</button>
    </div>

    <div class="filters">
      <div class="filters-row">
        <select id="monthHistoryFilter" class="select">
          <option value="all">Todos los meses</option>
        </select>

        <select id="typeHistoryFilter" class="select">
          <option value="all">Todos los tipos</option>
          <option value="gasto">Gastos</option>
          <option value="ingreso">Ingresos</option>
        </select>
      </div>

      <div class="filters-row">
        <select id="paymentHistoryFilter" class="select">
          <option value="all">Todos los pagos</option>
        </select>

        <select id="categoryHistoryFilter" class="select">
          <option value="all">Todas las categorías</option>
        </select>
      </div>

      <input
        id="searchHistoryInput"
        class="search"
        type="search"
        placeholder="Buscar detalle, categoría o pago..."
        autocomplete="off"
      />

      <div class="filters-row">
        <select id="sortHistoryFilter" class="select">
          <option value="newest">Más reciente</option>
          <option value="oldest">Más antiguo</option>
          <option value="amount_desc">Mayor monto</option>
          <option value="amount_asc">Menor monto</option>
        </select>
      </div>
    </div>

    <div id="historyMonthlyList" class="history-months">
      <div class="empty">Todavía no hay movimientos cargados.</div>
    </div>
  </div>
</section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
